<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handwriting Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Cedarville+Cursive&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;     /* 배경 투명하게 */
    }
  </style>
</head>
<body>

<div style="width: 310px; margin: 10px auto; perspective: 1400px;">
  <div id="calendar" style="
    width: 100%; 
    height: 355px; 
    background: transparent; 
    border-radius: 24px; 
    box-shadow: 
      15px 20px 35px -5px rgba(0,0,0,0.08), 
      -12px -12px 25px rgba(255,255,255,0.9),
      inset 6px 6px 12px rgba(255,255,255,0.85),
      inset -6px -6px 12px rgba(200,210,230,0.5);
    overflow: hidden; 
  ">
    
    <!-- 상단 헤더 -->
    <div style="background: linear-gradient(145deg, #ffffff, #f5f7fb); padding: 14px 20px 8px; text-align: center; border-bottom: 1px solid #e8ecf4; display: flex; align-items: center; justify-content: space-between;">
      <button onclick="prevMonth()" style="background:none; border:none; font-size:19px; color:#4a6b8a; cursor:pointer; padding:0 10px;">◀︎</button>
      <div id="monthTitle" style="font-family: 'Kalam', cursive; font-size: 15px; font-weight: 700; letter-spacing: 1px; color: #4a6b8a;">APRIL 2026</div>
      <button onclick="nextMonth()" style="background:none; border:none; font-size:19px; color:#4a6b8a; cursor:pointer; padding:0 10px;">▶︎</button>
    </div>
    
    <!-- 요일 -->
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11.5px; font-weight: 600; color: #6a8aa8; padding: 9px 0 5px; background: transparent; font-family: system-ui, sans-serif;">
      <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
    </div>
    
    <!-- 날짜 그리드 -->
    <div id="dates" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 6px 18px 18px; background: transparent;">
    </div>
  </div>
</div>

<script>
  let currentYear = 2026;
  let currentMonth = 4;

  function renderCalendar() {
    const monthNames = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
    document.getElementById("monthTitle").textContent = `${monthNames[currentMonth-1]} ${currentYear}`;
    
    const datesContainer = document.getElementById("dates");
    datesContainer.innerHTML = "";
    
    const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    
    for (let i = 0; i < firstDay; i++) {
      datesContainer.appendChild(document.createElement("div"));
    }
    
    const today = new Date();
    const isCurrentMonth = (today.getFullYear() === currentYear && today.getMonth() + 1 === currentMonth);
    
    for (let day = 1; day <= daysInMonth; day++) {
      const dayDiv = document.createElement("div");
      dayDiv.style.aspectRatio = "1/1";
      dayDiv.style.display = "flex";
      dayDiv.style.alignItems = "center";
      dayDiv.style.justifyContent = "center";
      dayDiv.style.fontFamily = "'Cedarville Cursive', cursive";
      dayDiv.style.fontSize = "17.5px";
      dayDiv.style.fontWeight = "400";
      dayDiv.style.color = "#4a6b8a";
      dayDiv.style.cursor = "pointer";
      dayDiv.style.transition = "all 0.2s";
      dayDiv.textContent = day;
      
      if (isCurrentMonth && today.getDate() === day) {
        dayDiv.style.background = "#4a6b8a";
        dayDiv.style.color = "#ffffff";
        dayDiv.style.borderRadius = "50%";
        dayDiv.style.fontWeight = "700";
        dayDiv.style.boxShadow = "0 3px 9px rgba(74, 107, 138, 0.35)";
      }
      
      dayDiv.onclick = () => alert(`${currentMonth}월 ${day}일`);
      datesContainer.appendChild(dayDiv);
    }
  }

  function prevMonth() {
    currentMonth--;
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    renderCalendar();
  }

  function nextMonth() {
    currentMonth++;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    renderCalendar();
  }

  renderCalendar();
</script>
</body>
</html>
